# LiteLLM proxy config
# Maps external OpenAI-shape requests to your local Ollama models
# Add / remove model entries as you fine-tune your own with LoRA (see /notebooks)

model_list:

  - model_name: fe-primary          # the default drop-in for smbaios adapter
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://ollama:11434
      timeout: 300

  - model_name: fe-embed            # embedding endpoint for RAG use cases
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

  # ─── your fine-tuned model, once trained via /notebooks/lora-finetune.ipynb ───
  # 1. train in notebook · export to GGUF · load via `ollama create fe-yourbiz -f Modelfile`
  # 2. add its entry here
  # - model_name: fe-yourbiz
  #   litellm_params:
  #     model: ollama/fe-yourbiz:latest
  #     api_base: http://ollama:11434

litellm_settings:
  drop_params: true                 # tolerate extra params from smbaios / OpenAI SDK versions
  telemetry: false                  # sovereign default · no phone-home
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_spend_logs: false         # local spend tracking · useful for internal cost model
